<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D2010"/>
      <stop offset="50%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1A0C06"/>
    </linearGradient>

    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF4D0"/>
      <stop offset="15%" stop-color="#FFE890"/>
      <stop offset="35%" stop-color="#F5D680"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="55%" stop-color="#FFEEB0"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="80%" stop-color="#C8941A"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <radialGradient id="sparkleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="aiClip">
      <text x="256" y="220" font-size="150" letter-spacing="8"
            font-family="Noto Sans CJK JP" font-weight="900"
            text-anchor="middle">AI</text>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  <rect x="44" y="44" width="424" height="424" rx="68" ry="68"
        fill="none" stroke="rgba(218,165,32,0.25)" stroke-width="1.5"/>
  <rect x="52" y="52" width="408" height="408" rx="62" ry="62"
        fill="none" stroke="rgba(218,165,32,0.15)" stroke-width="1"/>

  <text x="256" y="220" font-size="150" letter-spacing="8"
        font-family="Noto Sans CJK JP" font-weight="900"
        fill="url(#goldMetal)" text-anchor="middle">AI</text>

  <g clip-path="url(#aiClip)">
    <ellipse cx="200" cy="170" rx="80" ry="14" fill="white" opacity="0.85"
             transform="rotate(-30 200 170)"/>
    <ellipse cx="290" cy="200" rx="50" ry="6" fill="white" opacity="0.6"
             transform="rotate(-30 290 200)"/>
  </g>

  <g transform="translate(348, 130)">
    <circle cx="0" cy="0" r="20" fill="url(#sparkleGrad)"/>
    <path d="M 0,-32 L 2.5,-2.5 L 32,0 L 2.5,2.5 L 0,32 L -2.5,2.5 L -32,0 L -2.5,-2.5 Z"
          fill="white" opacity="1"/>
    <path d="M 0,-20 L 1.5,-1.5 L 20,0 L 1.5,1.5 L 0,20 L -1.5,1.5 L -20,0 L -1.5,-1.5 Z"
          fill="white" opacity="0.85"
          transform="rotate(45)"/>
  </g>

  <g transform="translate(155, 250)">
    <circle cx="0" cy="0" r="8" fill="url(#sparkleGrad)"/>
    <path d="M 0,-14 L 1.5,-1.5 L 14,0 L 1.5,1.5 L 0,14 L -1.5,1.5 L -14,0 L -1.5,-1.5 Z"
          fill="white" opacity="0.95"/>
  </g>

  <text x="256" y="320" font-size="64" letter-spacing="3"
        font-family="Noto Sans CJK JP" font-weight="900"
        fill="url(#goldMetal)" text-anchor="middle">Code</text>

  <text x="256" y="400" font-size="64" letter-spacing="3"
        font-family="Noto Sans CJK JP" font-weight="900"
        fill="url(#goldMetal)" text-anchor="middle">Reader</text>
</svg>
