<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Reader</title>
  <meta name="description" content="AIと作ったコードを自分の目で読み解く10日間">

  <!-- PWA設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2C1810">

  <!-- ファビコン -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">

  <!-- iOS用 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Code Reader">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=Klee+One:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & ROOT ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper:       #FDF6E3;
      --paper-dark:  #F0E8CC;
      --paper-cream: #FAF0D7;
      --line-color:  rgba(100, 149, 237, 0.22);
      --cover-dark:  #1E0F08;
      --cover:       #2C1810;
      --cover-mid:   #4A2E20;
      --gold:        #B8860B;
      --gold-light:  #DAA520;
      --gold-pale:   #F5D680;
      --text:        #2A2A2A;
      --text-mid:    #555;
      --text-light:  #888;
      --code-bg:     #2D2D2D;
      --code-text:   #E8E8E8;
      --correct:     #2D7A3E;
      --incorrect:   #B0413E;
      --correct-bg:  rgba(45, 122, 62, 0.1);
      --incorrect-bg:rgba(176, 65, 62, 0.1);
      --accent-blue: #4A80B0;
      --soon-bg:     rgba(120, 120, 120, 0.08);
    }

    body {
      background: radial-gradient(ellipse at top, #2a1a10 0%, #111 100%);
      min-height: 100vh;
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      font-weight: 500;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    /* ===== APP HEADER ===== */
    .app-header {
      text-align: center;
      margin-bottom: 20px;
      color: var(--gold-light);
      font-family: 'Klee One', cursive;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .app-header:hover { opacity: 0.85; }
    .app-header h1 {
      font-size: 1.3rem;
      letter-spacing: 0.35em;
      font-weight: 600;
    }
    .app-header .sub {
      font-size: 0.72rem;
      color: rgba(218, 165, 32, 0.55);
      letter-spacing: 0.25em;
      margin-top: 4px;
    }

    /* ===== STREAK BADGE ===== */
    .streak-badge {
      display: none;
      margin: 10px auto 0;
      padding: 6px 16px;
      background: rgba(218, 165, 32, 0.1);
      border: 1px solid rgba(218, 165, 32, 0.3);
      border-radius: 20px;
      color: var(--gold-light);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      font-family: 'Klee One', cursive;
    }
    .streak-badge.visible { display: inline-block; }

    /* ===== BOOK WRAPPER ===== */
    .book {
      width: 100%;
      max-width: 820px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        -8px 0 20px rgba(0,0,0,0.6),
        0 16px 48px rgba(0,0,0,0.7),
        inset -3px 0 10px rgba(0,0,0,0.25);
      position: relative;
    }

    /* ===== COVER PAGE ===== */
    #cover-page {
      cursor: pointer;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
      background: linear-gradient(145deg, #1E0F08 0%, #3D2010 35%, #2C1810 60%, #1A0C06 100%);
      position: relative;
      transition: filter 0.3s;
    }
    #cover-page:hover { filter: brightness(1.08); }
    #cover-page::before {
      content: '';
      position: absolute;
      top: 24px; left: 24px; right: 24px; bottom: 24px;
      border: 1px solid rgba(218,165,32,0.25);
      pointer-events: none;
    }
    #cover-page::after {
      content: '';
      position: absolute;
      top: 28px; left: 28px; right: 28px; bottom: 28px;
      border: 1px solid rgba(218,165,32,0.10);
      pointer-events: none;
    }

    .cover-icon { font-size: 64px; margin-bottom: 24px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
    .cover-title {
      font-family: 'Klee One', cursive;
      font-size: 2rem;
      color: var(--gold-pale);
      text-align: center;
      letter-spacing: 0.2em;
      line-height: 1.5;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 20px rgba(218,165,32,0.2);
    }
    .cover-divider {
      width: 120px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-light), transparent);
      margin: 18px auto;
    }
    .cover-subtitle {
      font-size: 0.74rem;
      color: rgba(218,165,32,0.55);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .cover-tagline {
      margin-top: 18px;
      font-size: 0.85rem;
      color: rgba(245, 214, 128, 0.7);
      font-family: 'Klee One', cursive;
      letter-spacing: 0.15em;
      text-align: center;
    }
    .cover-author {
      position: absolute;
      bottom: 44px; right: 44px;
      font-size: 0.72rem;
      color: rgba(218,165,32,0.4);
      letter-spacing: 0.2em;
    }
    .cover-cta {
      margin-top: 32px;
      padding: 10px 28px;
      border: 1px solid rgba(218,165,32,0.45);
      color: rgba(218,165,32,0.85);
      font-family: 'Klee One', cursive;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      animation: coverPulse 2.5s ease-in-out infinite;
    }
    @keyframes coverPulse {
      0%, 100% { opacity: 0.6; border-color: rgba(218,165,32,0.3); }
      50% { opacity: 1; border-color: rgba(218,165,32,0.7); }
    }

    /* ===== INNER PAGE ===== */
    .inner-page {
      display: none;
      background: var(--paper);
      padding: 44px 40px;
      position: relative;
      overflow: hidden;
      min-height: 600px;
    }
    .inner-page.active { display: block; }

    .inner-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          transparent 0px,
          transparent 31px,
          var(--line-color) 31px,
          var(--line-color) 32px
        );
      background-size: 100% 32px;
      pointer-events: none;
    }

    /* ===== TABLE OF CONTENTS ===== */
    .page-heading {
      font-family: 'Klee One', cursive;
      font-size: 1.55rem;
      color: var(--cover-mid);
      padding-bottom: 10px;
      border-bottom: 2px solid var(--gold);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .toc-intro {
      position: relative;
      z-index: 1;
      margin-bottom: 24px;
      padding: 14px 18px;
      background: rgba(218, 165, 32, 0.08);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      font-size: 0.92rem;
      color: var(--text-mid);
      line-height: 1.7;
    }

    .toc-list { list-style: none; position: relative; z-index: 1; }
    .toc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px dashed rgba(0,0,0,0.12);
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.95rem;
    }
    .toc-item:hover:not(.coming-soon) { background: rgba(218, 165, 32, 0.06); }
    .toc-item.coming-soon { cursor: not-allowed; opacity: 0.5; background: var(--soon-bg); }

    .toc-day {
      flex-shrink: 0;
      width: 56px;
      font-family: 'Klee One', cursive;
      font-size: 0.85rem;
      color: var(--cover-mid);
      letter-spacing: 0.1em;
    }
    .toc-title { flex: 1; color: var(--text); }
    .toc-status {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      letter-spacing: 0.05em;
    }
    .toc-status.done { background: var(--correct-bg); color: var(--correct); }
    .toc-status.unread { background: rgba(218, 165, 32, 0.15); color: #8B6914; }
    .toc-status.soon { background: rgba(120, 120, 120, 0.15); color: var(--text-light); }

    /* ===== ENTRY PAGE ===== */
    .entry-content { position: relative; z-index: 1; }

    .day-label {
      display: inline-block;
      font-family: 'Klee One', cursive;
      font-size: 0.85rem;
      color: white;
      background: var(--cover-mid);
      padding: 4px 14px;
      border-radius: 4px;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .entry-title {
      font-family: 'Klee One', cursive;
      font-size: 1.6rem;
      color: var(--cover);
      padding-bottom: 10px;
      border-bottom: 2px solid var(--gold);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .section-heading {
      font-family: 'Klee One', cursive;
      font-size: 1.15rem;
      color: var(--cover-mid);
      margin-top: 28px;
      margin-bottom: 14px;
      padding-left: 12px;
      border-left: 4px solid var(--gold);
    }

    .description {
      font-size: 0.95rem;
      line-height: 1.95;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .description strong { color: var(--cover); }

    /* Code block */
    .code-block {
      background: var(--code-bg);
      color: var(--code-text);
      font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 16px 18px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 14px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      white-space: pre;
    }
    .code-block .comment { color: #888; font-style: italic; }
    .code-block .tag { color: #7BB7E0; }
    .code-block .attr { color: #D4A66A; }
    .code-block .str { color: #A8C982; }

    /* Inline code */
    code.inline {
      background: rgba(0,0,0,0.06);
      color: #B0413E;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* Point card */
    .point-card {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(184, 134, 11, 0.2);
      border-radius: 6px;
      padding: 14px 18px;
      margin: 12px 0;
    }
    .point-card .point-title {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      font-size: 0.98rem;
      font-weight: 600;
      color: #6B4A35;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }
    .point-card .point-body {
      font-size: 0.9rem;
      line-height: 1.85;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    /* Table */
    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 0.88rem;
      background: rgba(255,255,255,0.4);
    }
    .info-table th, .info-table td {
      padding: 8px 12px;
      text-align: left;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .info-table th {
      background: rgba(184, 134, 11, 0.12);
      font-family: 'Klee One', cursive;
      color: var(--cover);
    }

    /* Tree */
    .tree-block {
      background: rgba(0,0,0,0.04);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      padding: 14px 18px;
      border-radius: 6px;
      margin: 12px 0;
      color: var(--cover);
      white-space: pre;
      overflow-x: auto;
    }

    /* ===== QUIZ ===== */
    .quiz-section {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 2px dashed rgba(184, 134, 11, 0.4);
    }

    .question-block {
      margin-bottom: 28px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      border: 1px solid rgba(184, 134, 11, 0.15);
    }

    .question-num {
      font-family: 'Klee One', cursive;
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 10px;
      letter-spacing: 0.1em;
    }

    .question-text {
      font-size: 0.95rem;
      line-height: 1.85;
      margin-bottom: 14px;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .options-list { display: flex; flex-direction: column; gap: 8px; }

    .option {
      padding: 12px 16px;
      background: white;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.92rem;
      line-height: 1.7;
      transition: all 0.15s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      letter-spacing: 0.02em;
    }
    .option:hover:not(.locked) { background: rgba(218, 165, 32, 0.08); border-color: var(--gold); }
    .option.selected { background: rgba(218, 165, 32, 0.15); border-color: var(--gold); }
    .option.locked { cursor: default; }
    .option.correct { background: var(--correct-bg); border-color: var(--correct); }
    .option.incorrect { background: var(--incorrect-bg); border-color: var(--incorrect); }
    .option-letter {
      flex-shrink: 0;
      font-family: 'Klee One', cursive;
      font-weight: 600;
      color: var(--cover-mid);
      width: 18px;
    }
    .option.correct .option-letter { color: var(--correct); }
    .option.incorrect .option-letter { color: var(--incorrect); }

    .feedback {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 5px;
      font-size: 0.88rem;
      line-height: 1.7;
      display: none;
    }
    .feedback.visible { display: block; }
    .feedback.correct { background: var(--correct-bg); color: var(--correct); border-left: 3px solid var(--correct); }
    .feedback.incorrect { background: var(--incorrect-bg); color: var(--incorrect); border-left: 3px solid var(--incorrect); }

    .submit-area {
      margin-top: 24px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      font-family: 'Klee One', cursive;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      background: var(--cover-mid);
      color: var(--gold-pale);
      border: 1px solid var(--gold);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--cover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn.secondary {
      background: transparent;
      color: var(--cover-mid);
      border-color: var(--cover-mid);
    }
    .btn.secondary:hover { background: rgba(74, 46, 32, 0.08); }

    /* Result panel */
    .result-panel {
      margin-top: 20px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(218,165,32,0.15), rgba(218,165,32,0.05));
      border: 1px solid var(--gold);
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .result-panel.visible { display: block; }
    .result-score {
      font-family: 'Klee One', cursive;
      font-size: 2.4rem;
      color: var(--cover);
      margin-bottom: 6px;
    }
    .result-message {
      font-size: 0.95rem;
      color: var(--text-mid);
      margin-bottom: 16px;
    }
    .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    /* Extra problem section */
    .extra-section {
      margin-top: 28px;
      padding: 18px 20px;
      background: rgba(74, 128, 176, 0.08);
      border: 1px solid rgba(74, 128, 176, 0.25);
      border-radius: 8px;
    }
    .extra-title {
      font-family: 'Klee One', cursive;
      color: var(--accent-blue);
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .extra-desc {
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-mid);
      margin-bottom: 12px;
    }
    .copy-btn {
      padding: 8px 18px;
      background: white;
      border: 1px solid var(--accent-blue);
      color: var(--accent-blue);
      font-family: 'Klee One', cursive;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: var(--accent-blue); color: white; }
    .copy-btn.copied { background: var(--correct); color: white; border-color: var(--correct); }

    /* ===== NAVIGATION ===== */
    .bottom-nav {
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .nav-btn {
      padding: 10px 18px;
      background: white;
      border: 1px solid var(--cover-mid);
      color: var(--cover-mid);
      font-family: 'Klee One', cursive;
      font-size: 0.88rem;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--cover-mid); color: var(--paper); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Coming Soon page */
    .soon-content {
      text-align: center;
      padding: 80px 30px;
      position: relative;
      z-index: 1;
    }
    .soon-emoji { font-size: 64px; margin-bottom: 18px; opacity: 0.6; }
    .soon-title {
      font-family: 'Klee One', cursive;
      font-size: 1.4rem;
      color: var(--text-mid);
      margin-bottom: 10px;
    }
    .soon-desc {
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text-light);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      body { padding: 16px 8px 60px; }
      .inner-page { padding: 28px 22px; }
      .entry-title { font-size: 1.3rem; }
      .page-heading { font-size: 1.3rem; }
      .toc-day { width: 50px; font-size: 0.8rem; }
      .code-block { font-size: 0.74rem; padding: 12px 14px; }
      #cover-page { padding: 50px 30px; }
      .cover-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- App Header -->
  <header class="app-header" id="app-header" title="表紙に戻る">
    <h1>📖 AI Code Reader</h1>
    <p class="sub">Read the Code, Learn the Logic</p>
    <div class="streak-badge" id="streak-badge"></div>
  </header>

  <!-- Book -->
  <div class="book">

    <!-- COVER PAGE -->
    <div id="cover-page" class="cover-page-wrap">
      <div class="cover-icon">📖</div>
      <div class="cover-title">AI Code<br>Reader</div>
      <div class="cover-divider"></div>
      <div class="cover-subtitle">10 Days to Read Code</div>
      <div class="cover-tagline">AIと作ったコードを<br>自分の目で読み解く10日間</div>
      <div class="cover-cta">▸ もくじを開く</div>
      <div class="cover-author">by OM</div>
    </div>

    <!-- TOC -->
    <div id="toc-page" class="inner-page">
      <h2 class="page-heading">📋 もくじ</h2>
      <div class="toc-intro">
        各回で <strong>解説 → 5問の選択式クイズ</strong> を進めていきます。
      </div>
      <ul class="toc-list" id="toc-list"></ul>
    </div>

    <!-- Day pages container -->
    <div id="entries-container"></div>

  </div>

<script>
/* ================================================================
   DATA: Day1 / Day2 fully prepared
================================================================ */
const days = [
  {
    id: 1,
    title: "HTMLの&lt;head&gt;を読む",
    available: true,
    body: `
      <div class="day-label">Day 1 / 10</div>
      <h2 class="entry-title">HTMLの&lt;head&gt;を読む</h2>

      <h3 class="section-heading">📚 今日のテーマ</h3>
      <p class="description">
        ブラウザは画面に何かを表示する前に、まず「このページはどんなページか」を理解する必要があります。その<strong>自己紹介情報</strong>が書かれているのが <code class="inline">&lt;head&gt;</code> タグの中です。今日は、自分のアプリの <code class="inline">&lt;head&gt;</code> を1行ずつ読み解きます。
      </p>

      <h3 class="section-heading">📝 今日読むコード</h3>
      <div class="code-block"><span class="tag">&lt;!DOCTYPE html&gt;</span>
<span class="tag">&lt;html</span> <span class="attr">lang</span>=<span class="str">"ja"</span><span class="tag">&gt;</span>
<span class="tag">&lt;head&gt;</span>
  <span class="tag">&lt;meta</span> <span class="attr">charset</span>=<span class="str">"UTF-8"</span><span class="tag">&gt;</span>
  <span class="tag">&lt;meta</span>
    <span class="attr">name</span>=<span class="str">"viewport"</span>
    <span class="attr">content</span>=<span class="str">"width=device-width, initial-scale=1.0"</span>

/* ================================================================

================================================================ */
const KEY_PROGRESS  = 'aicr-progress-v1';   // {dayId: {answers:[..], score, completedAt}}

/* ================================================================
   PROGRESS HELPERS
================================================================ */
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(KEY_PROGRESS) || '{}'); }
  catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem(KEY_PROGRESS, JSON.stringify(p));
}

/* ================================================================
   STREAK
================================================================ */
function updateStreak() {
  const progress = loadProgress();
  const completed = Object.values(progress).filter(p => p.completedAt).length;
  const badge = document.getElementById('streak-badge');
  if (completed > 0) {
    badge.textContent = `✓ ${completed} / 10 日 完了`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

/* ================================================================
   RENDER TOC
================================================================ */
function renderTOC() {
  const list = document.getElementById('toc-list');
  const progress = loadProgress();
  list.innerHTML = days.map(day => {
    const p = progress[day.id];
    let statusHTML = '';
    let cls = 'toc-item';
    if (!day.available) {
      statusHTML = '<span class="toc-status soon">Coming Soon</span>';
      cls += ' coming-soon';
    } else if (p && p.completedAt) {
      statusHTML = `<span class="toc-status done">✓ ${p.score}/5</span>`;
    } else {
      statusHTML = '<span class="toc-status unread">未読</span>';
    }
    const dataAttr = day.available ? `data-day="${day.id}"` : '';
    return `
      <li class="${cls}" ${dataAttr}>
        <span class="toc-day">Day ${day.id}</span>
        <span class="toc-title">${day.title}</span>
        ${statusHTML}
      </li>
    `;
  }).join('');

  // Attach TOC click handlers
  document.querySelectorAll('#toc-list .toc-item:not(.coming-soon)').forEach(el => {
    el.addEventListener('click', () => {
      const dayId = parseInt(el.dataset.day);
      goToDay(dayId);
    });
  });
}

                    ${q.options.map((opt, oi) => `
                      <div class="option" data-day="${day.id}" data-qi="${qi}" data-oi="${oi}">
                        <span class="option-letter">${String.fromCharCode(65 + oi)}.</span>
                        <span class="option-text">${opt}</span>
                      </div>
                    `).join('')}
                  </div>
                  <div class="feedback" id="feedback-${day.id}-${qi}"></div>
                </div>
              `).join('')}
            </div>

            <div class="result-panel" id="result-${day.id}">
              <div class="result-score" id="score-${day.id}"></div>
              <div class="result-message" id="msg-${day.id}"></div>
              <div class="result-actions">
                <button class="btn secondary reset-btn" data-day="${day.id}">もう一度</button>
                <button class="btn nav-toc-btn">📋 もくじへ</button>
              </div>
            </div>

            <div class="extra-section">
              <div class="extra-title">🔍 もっと深く理解したい？</div>
              <div class="extra-desc">
                追加の問題をClaudeに作ってもらうためのプロンプトをコピーします。<br>
                Claudeに貼り付ければ、Day ${day.id} の追加問題が出題されます。
              </div>
              <button class="copy-btn" data-day="${day.id}">📋 プロンプトをコピー</button>
            </div>
          </div>
        </div>

        <div class="bottom-nav">
          <button class="nav-btn nav-prev-btn" data-day="${day.id}">◀ 前</button>
          <button class="nav-btn nav-toc-btn">📋 もくじへ</button>
          <button class="nav-btn nav-next-btn" data-day="${day.id}">次 ▶</button>
        </div>
      </div>
    `;
  }).join('');

  // Attach event listeners after innerHTML is set
  attachEventListeners();
}

function attachEventListeners() {
  // Option selection
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const dayId = parseInt(el.dataset.day);
      const qi = parseInt(el.dataset.qi);
      const oi = parseInt(el.dataset.oi);
      selectOption(dayId, qi, oi);
    });
  });

  // Reset buttons
  document.querySelectorAll('.reset-btn').forEach(el => {
    el.addEventListener('click', () => resetQuiz(parseInt(el.dataset.day)));
  });

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(el => {
    el.addEventListener('click', () => copyExtraPrompt(parseInt(el.dataset.day), el));
  });

  // Navigation buttons
  document.querySelectorAll('.nav-toc-btn').forEach(el => {
    el.addEventListener('click', () => goToTOC());
  });
  document.querySelectorAll('.nav-prev-btn').forEach(el => {
    el.addEventListener('click', () => navDay(parseInt(el.dataset.day), -1));
  });
  document.querySelectorAll('.nav-next-btn').forEach(el => {
    el.addEventListener('click', () => navDay(parseInt(el.dataset.day), 1));
  });
}

/* ================================================================
   QUIZ INTERACTION
================================================================ */
const tempAnswers = {}; // {dayId: [oi, oi, ...]}

function selectOption(dayId, qi, oi) {
  // 既に回答済みの問題はスキップ
  if (tempAnswers[dayId] && tempAnswers[dayId][qi] !== undefined) return;
  if (!tempAnswers[dayId]) tempAnswers[dayId] = [];
  tempAnswers[dayId][qi] = oi;

  const day = days.find(d => d.id === dayId);
  const q = day.questions[qi];
  const correctOi = q.answer;
  const isCorrect = oi === correctOi;

  // 該当問題ブロックの選択肢をロック＆色付け
  const block = document.querySelector(`#quiz-${dayId} .question-block[data-qi="${qi}"]`);
  block.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('locked');
    if (i === correctOi) el.classList.add('correct');
    else if (i === oi) el.classList.add('incorrect');
  });

  // フィードバック表示
  const fb = document.getElementById(`feedback-${dayId}-${qi}`);
  fb.classList.add('visible', isCorrect ? 'correct' : 'incorrect');
  fb.innerHTML = (isCorrect ? '⭕️ 正解！ ' : '❌ 不正解。 ') + q.explain;

  // 全問回答完了したか確認
  const answers = tempAnswers[dayId];
  let answeredCount = 0;
  for (let i = 0; i < day.questions.length; i++) {
    if (answers[i] !== undefined) answeredCount++;
  }
  if (answeredCount === day.questions.length) {
    showFinalResult(dayId);
  }
}

function showFinalResult(dayId) {
  const day = days.find(d => d.id === dayId);
  const answers = tempAnswers[dayId];
  let score = 0;
  day.questions.forEach((q, qi) => {
    if (answers[qi] === q.answer) score++;
  });

  const result = document.getElementById(`result-${dayId}`);
  result.classList.add('visible');
  document.getElementById(`score-${dayId}`).textContent = `${score} / 5`;
  document.getElementById(`msg-${dayId}`).textContent = scoreMessage(score);

  // Save progress
  const progress = loadProgress();
  progress[dayId] = {
    answers: answers,
    score: score,
    completedAt: new Date().toISOString()
  };
  saveProgress(progress);
  updateStreak();
  renderTOC();

  // スクロール
  setTimeout(() => {
    result.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 250);
}

function scoreMessage(score) {
  if (score === 5) return '完璧です。次の日へ進みましょう。';
  if (score === 4) return '惜しい！間違えた問題を見直して定着させましょう。';
  if (score === 3) return '合格圏。間違えた問題の解説を読み込みましょう。';
  if (score === 2) return 'もう一度解説を読み返してから、再挑戦してみてください。';
  if (score === 1) return '一度解説に戻り、ゆっくり読み直してみましょう。';
  return '焦らずもう一度。少し時間を置いてから戻ってきてもOKです。';
}

function resetQuiz(dayId) {
  tempAnswers[dayId] = [];
  const day = days.find(d => d.id === dayId);
  document.querySelectorAll(`#quiz-${dayId} .option`).forEach(el => {
    el.classList.remove('selected', 'correct', 'incorrect', 'locked');
  });
  document.querySelectorAll(`#quiz-${dayId} .feedback`).forEach(el => {
    el.classList.remove('visible', 'correct', 'incorrect');
    el.innerHTML = '';
  });
  document.getElementById(`result-${dayId}`).classList.remove('visible');
  window.scrollTo({ top: document.getElementById(`day-${dayId}`).offsetTop - 20, behavior: 'smooth' });
}

/* ================================================================
   EXTRA PROMPT COPY
================================================================ */
function copyExtraPrompt(dayId, btn) {
  const day = days.find(d => d.id === dayId);
  // タイトルのHTMLエスケープを元に戻す（<>用）
  const cleanTitle = day.title.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
  const prompt = `AI Code ReaderのDay ${dayId}（${cleanTitle}）について、追加の理解度チェック問題を5問作ってください。

【条件】
- 4択の選択式
- すでに学習済みの内容のおさらいと、少し応用的な視点も含める
- 各問の正解と、間違えやすいポイントの解説をつけてください
- 初学者にも分かる平易な日本語で

参考までに、Day ${dayId} の主な学習内容は「${cleanTitle}」です。 index.html というHTMLファイルの構造を読み解く中で、以下のような項目を扱いました。

${day.id === 1 ? '・<head>タグの役割\n・<meta charset>の意味\n・viewportの設定\n・<title>の役割\n・<link>でのフォント・manifest読み込み' : ''}${day.id === 2 ? '・<body>タグの役割\n・HTMLのコメント記法\n・<header>/<h1>/<p>/<div>/<button>などのタグ\n・classとidの違い\n・onclickによるイベント指定' : ''}

それでは追加問題をお願いします。`;

  // 既にfallback textareaが表示されていれば、ボタン押下で閉じる
  const existing = btn.parentElement.querySelector('.fallback-textarea');
  if (existing) {
    existing.remove();
    btn.textContent = '📋 プロンプトをコピー';
    btn.classList.remove('copied');
    return;
  }

  // 古典的な方式（file://でも動く）
  let success = false;
  const textarea = document.createElement('textarea');
  textarea.value = prompt;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    success = document.execCommand('copy');
  } catch (e) {
    success = false;
  }
  document.body.removeChild(textarea);

  if (success) {
    showCopySuccess(btn);
    return;
  }

  // モダンAPI（HTTPSやlocalhost環境用）
  if (navigator.clipboard) {
    navigator.clipboard.writeText(prompt).then(() => {
      showCopySuccess(btn);
    }).catch(() => {
      showCopyFallback(btn, prompt);
    });
  } else {
    showCopyFallback(btn, prompt);
  }
}

function showCopySuccess(btn) {
  btn.classList.add('copied');
  btn.textContent = '✓ コピーしました';
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.textContent = '📋 プロンプトをコピー';
  }, 2500);
}

function showCopyFallback(btn, prompt) {
  const ta = document.createElement('textarea');
  ta.className = 'fallback-textarea';
  ta.value = prompt;
  ta.style.cssText = 'width:100%;min-height:180px;margin-top:12px;padding:10px;font-family:monospace;font-size:0.78rem;border:1px solid #999;border-radius:4px;background:white;';
  ta.readOnly = true;
  btn.parentElement.appendChild(ta);
  ta.focus();
  ta.select();
  btn.textContent = '↓ 下の枠から手動でコピー（クリックで閉じる）';
}

/* ================================================================
   NAVIGATION
================================================================ */
function hideAll() {
  document.getElementById('cover-page').style.display = 'none';
  document.getElementById('toc-page').classList.remove('active');
  document.querySelectorAll('#entries-container .inner-page').forEach(el => el.classList.remove('active'));
}

function goToCover() {
  hideAll();
  document.getElementById('cover-page').style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToTOC() {
  hideAll();
  document.getElementById('toc-page').classList.add('active');
  renderTOC();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToDay(dayId) {
  hideAll();
  document.getElementById(`day-${dayId}`).classList.add('active');
  // restore answers if completed
  const progress = loadProgress();
  if (progress[dayId] && progress[dayId].completedAt) {
    const day = days.find(d => d.id === dayId);
    if (day.available) {
      tempAnswers[dayId] = progress[dayId].answers;
      // re-apply state
      day.questions.forEach((q, qi) => {
        const block = document.querySelector(`#quiz-${dayId} .question-block[data-qi="${qi}"]`);
        if (!block) return;
        const selectedOi = progress[dayId].answers[qi];
        block.querySelectorAll('.option').forEach((el, oi) => {
          el.classList.add('locked');
          if (oi === q.answer) el.classList.add('correct');
          else if (oi === selectedOi) el.classList.add('incorrect');
        });
        const fb = document.getElementById(`feedback-${dayId}-${qi}`);
        fb.classList.add('visible', selectedOi === q.answer ? 'correct' : 'incorrect');
        fb.innerHTML = (selectedOi === q.answer ? '⭕️ 正解！ ' : '❌ 不正解。 ') + q.explain;
      });
      const result = document.getElementById(`result-${dayId}`);
      result.classList.add('visible');
      document.getElementById(`score-${dayId}`).textContent = `${progress[dayId].score} / 5`;
      document.getElementById(`msg-${dayId}`).textContent = scoreMessage(progress[dayId].score);
    }
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navDay(currentId, dir) {
  const next = currentId + dir;
  if (next < 1) { goToTOC(); return; }
  if (next > days.length) { goToTOC(); return; }
  const target = days.find(d => d.id === next);
  if (!target) return;
  goToDay(next);
}

/* ================================================================
   INIT
================================================================ */
document.getElementById('app-header').addEventListener('click', goToCover);
document.getElementById('cover-page').addEventListener('click', goToTOC);

renderEntries();
renderTOC();
updateStreak();

// PWA: Service Worker 登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.warn('Service Worker registration failed:', err);
    });
  });
}
</script>
